<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | O2 Helpdesk UK</title>
    <meta name="description" content="Sorry, we couldn't find the page you're looking for. Get O2 support at O2 Helpdesk UK.">
    <meta name="robots" content="noindex, follow">
    <meta name="theme-color" content="#0019A5">
    <link rel="canonical" href="https://o2helpdesk.co.uk/404.html">
    <link rel="stylesheet" href="styles.css">
    <style>
        .error-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0019A5 0%, #0050FF 50%, #00BFFF 100%);
            padding: 120px 20px 40px;
            text-align: center;
        }
        .error-container {
            max-width: 600px;
            color: white;
        }
        .error-code {
            font-size: clamp(6rem, 15vw, 12rem);
            font-weight: 800;
            line-height: 1;
            opacity: 0.3;
            margin-bottom: 0;
        }
        .error-title {
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            margin-bottom: 1rem;
        }
        .error-message {
            font-size: 1.1rem;
            opacity: 0.9;
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        .error-actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        .error-cta {
            background: white;
            color: #0019A5;
            padding: 1rem 2rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .error-cta:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .error-cta.secondary {
            background: rgba(255,255,255,0.2);
            color: white;
        }
        .error-help {
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid rgba(255,255,255,0.2);
        }
        .error-help h3 {
            font-size: 1.2rem;
            margin-bottom: 1rem;
        }
        .error-links {
            list-style: none;
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        .error-links a {
            color: white;
            opacity: 0.8;
            text-decoration: underline;
        }
        .error-links a:hover {
            opacity: 1;
        }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="header-container">
            <a href="/" class="logo">
                <div class="logo-icon">O2</div>
                <span>Helpdesk UK</span>
            </a>
        </div>
    </header>
    
    <main>
        <section class="error-section">
            <div class="error-container">
                <p class="error-code">404</p>
                <h1 class="error-title">Page Not Found</h1>
                <p class="error-message">Sorry, we couldn't find the page you're looking for. It might have been moved, deleted, or you may have typed the URL incorrectly.</p>
                
                <div class="error-actions">
                    <a href="/" class="error-cta">Go to Homepage</a>
                    <a href="tel:01202925102" class="error-cta secondary">📞 Call Support</a>
                </div>
                
                <div class="error-help">
                    <h3>Popular Pages</h3>
                    <ul class="error-links">
                        <li><a href="/billing.html">Billing Support</a></li>
                        <li><a href="/support.html">Technical Support</a></li>
                        <li><a href="/faq.html">FAQ</a></li>
                        <li><a href="/blog/">Blog</a></li>
                        <li><a href="/contact.html">Contact Us</a></li>
                    </ul>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
