<!-- ============================================ -->
<!-- AD PLACEMENT BEST PRACTICES -->
<!-- ============================================ -->

<!--
1. ABOVE THE FOLD:
   - Maximum 1 ad unit
   - Must have substantial content above it
   - Ad should not be the first thing users see

2. WITHIN CONTENT:
   - Space ads at least 2-3 paragraphs apart
   - Use "Advertisement" label
   - Don't interrupt reading flow

3. BELOW CONTENT:
   - Safe placement for multiple ads
   - Good for multiplex/related content ads

4. SIDEBAR:
   - Sticky ads perform well
   - Don't place too close to navigation

5. AVOID:
   - Placing ads too close to navigation
   - More than 3-4 ads per page (for new sites)
   - Ads that look like content
   - Auto-refreshing ads
   - Pop-up/pop-under ads
-->

<style>
/* Ad Container Styles */
.ad-container {
  margin: 2rem 0;
  text-align: center;
  min-height: 90px; /* Prevent layout shift */
}

  margin: 2.5rem 0;
  padding: 1.5rem;
  background: #f8f9fa;
  border-radius: 12px;
  text-align: center;
}

.ad-section {
  padding: 2rem 0;
}

/* Responsive Ad Sizing */
@media (max-width: 768px) {
  .ad-container {
    margin: 1.5rem 0;
  }
  
  .ad-container-in-content {
    margin: 2rem 0;
    padding: 1rem;
  }
  
  /* Hide large desktop ads on mobile */
  .desktop-only-ad {
    display: none;
  }
}

/* Ad Label Styling */
.ad-label {
  font-size: 0.75rem;
  color: #666;
  margin-bottom: 0.5rem;
  text-align: center;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* Prevent Ad Overlap */
.adsbygoogle {
  display: block;
  overflow: hidden;
}
</style>
